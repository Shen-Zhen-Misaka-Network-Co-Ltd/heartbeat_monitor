name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  release:
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: softprops/action-gh-release@v2
        with:
          files: client/flutter/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
