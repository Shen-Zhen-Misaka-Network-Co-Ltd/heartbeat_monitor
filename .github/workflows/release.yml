name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Restore signing key
        run: |
          mkdir -p "$HOME/.android"
          printf '%s' "$HEARTWITH_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/debug.keystore"
          chmod 600 "$HOME/.android/debug.keystore"
          test -s "$HOME/.android/debug.keystore"
          keytool -list -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey >/dev/null
        env:
          HEARTWITH_DEBUG_KEYSTORE_BASE64: ${{ secrets.HEARTWITH_DEBUG_KEYSTORE_BASE64 }}

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Compose APK
        run: ./gradlew :heartwith-compose:assembleRelease

      - name: Build LSPosed APK
        run: ./gradlew :heartwith-mihealth-lsp:assembleRelease

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            clients/heartwith-compose/build/outputs/apk/release/Heartwith-*-release.apk
            clients/heartwith-mihealth-lsp/build/outputs/apk/release/Heartwith-*-release.apk
          generate_release_notes: true
